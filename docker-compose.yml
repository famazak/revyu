services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 10s
      timeout: 5s
      retries: 5
  feedy:
    build: .
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      GEN_FEEDBACK_OLLAMA_URL: "http://ollama:11434"
      GEN_FEEDBACK_OLLAMA_MODEL: "${GEN_FEEDBACK_OLLAMA_MODEL:-llama3.2}"
      GEN_FEEDBACK_MAX_COMMITS: "${GEN_FEEDBACK_MAX_COMMITS:-20}"
      GEN_FEEDBACK_MAX_DIFF_CHARS: "${GEN_FEEDBACK_MAX_DIFF_CHARS:-8000}"
    # Mount the developer's current project into /repo so git commands work
    volumes:
      - "${GEN_FEEDBACK_REPO_PATH:-.}:/repo:ro"
    profiles:
      - tools   # opt-in; doesn't start automatically with `docker compose up`
volumes:
  ollama_data:
