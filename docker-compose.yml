services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
  feedy:
    build: .
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      FEEDY_OLLAMA_URL: "http://ollama:11434"
      FEEDY_OLLAMA_MODEL: "${FEEDY_OLLAMA_MODEL:-llama3.2}"
      FEEDY_MAX_COMMITS: "${FEEDY_MAX_COMMITS:-20}"
      FEEDY_MAX_DIFF_CHARS: "${FEEDY_MAX_DIFF_CHARS:-8000}"
    # Mount the developer's current project into /repo so git commands work
    volumes:
      - "${GEN_FEEDBACK_REPO_PATH:-.}:/repo:ro"
    profiles:
      - tools   # opt-in; doesn't start automatically with `docker compose up`
volumes:
  ollama_data:
